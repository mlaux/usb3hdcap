name: Build DKMS Packages

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  VERSION: "0.1.0"
  # Keep in sync with PACKAGE_VERSION in dkms.conf
  MODULE_FILES: >-
    dkms.conf Makefile usb3hdcap.h
    usb3hdcap-core.c usb3hdcap-video.c usb3hdcap-composite.c
    usb3hdcap-hdmi.c usb3hdcap-audio.c

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dkms
        run: sudo apt-get update && sudo apt-get install -y dkms

      - name: Prepare DKMS source
        run: |
          sudo mkdir -p /usr/src/usb3hdcap-$VERSION
          for f in $MODULE_FILES; do
            sudo cp "$f" /usr/src/usb3hdcap-$VERSION/
          done
          sudo dkms add usb3hdcap/$VERSION

      - name: Build deb package
        run: sudo dkms mkdeb usb3hdcap/$VERSION --source-only

      - uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: /var/lib/dkms/usb3hdcap/${{ env.VERSION }}/deb/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dkms and rpm-build
        run: dnf install -y dkms rpm-build

      - name: Prepare DKMS source
        run: |
          mkdir -p /usr/src/usb3hdcap-$VERSION
          for f in $MODULE_FILES; do
            cp "$f" /usr/src/usb3hdcap-$VERSION/
          done
          dkms add usb3hdcap/$VERSION

      - name: Build rpm package
        run: dkms mkrpm usb3hdcap/$VERSION --source-only

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: /var/lib/dkms/usb3hdcap/${{ env.VERSION }}/rpm/*.rpm

  upload-release:
    if: github.event_name == 'release'
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-package/*.deb
            rpm-package/*.rpm
